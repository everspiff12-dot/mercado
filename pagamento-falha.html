<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pagamento Não Concluído ⚠️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="text-align:center; padding: 60px 20px;">
        <h1 style="color: #ff4444; font-size: 32px;">⚠️ Pagamento Não Concluído</h1>
        <p style="font-size: 18px; margin: 20px 0;">Não foi possível processar seu pagamento.</p>
        <p>Seu cadastro permanece pendente. Você pode tentar novamente.</p>
        <button class="btn-primary" onclick="window.history.back()">
            ← Voltar e tentar novamente
        </button>
        <button class="btn-primary" onclick="window.location.href='index.html'" style="margin-left: 10px;">
            Ir para página inicial
        </button>
    </div>
</body>
</html>
